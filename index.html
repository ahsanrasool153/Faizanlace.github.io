<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faizan Lace Store</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; text-align: center; }
        header { background-color: #ff4757; color: white; padding: 20px; font-size: 26px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .sub-text { font-size: 14px; display: block; margin-top: 5px; font-weight: normal; color: #ffeaa7; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .product-card { background: white; margin: 15px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 250px; }
        .product-card img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        .product-title { font-size: 20px; margin: 10px 0; font-weight: bold; color: #2d3436; }
        .product-price { color: #2ecc71; font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .order-btn { display: inline-block; background-color: #25d366; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .order-btn:hover { background-color: #128c7e; }
    </style>
</head>
<body>

    <header>
        ✨ Faizan Lace Store
        <span class="sub-text">Welcome to our Online Shop</span>
    </header>

    <div class="container">
        <!-- Product 1 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/250" alt="Lace Product 1">
            <div class="product-title">Beautiful Lace Design 1</div>
            <div class="product-price">Rs. 500</div>
            <!-- Niche diye gaye number 923001234567 ko apne WhatsApp number se badlein -->
            <a href="https://wa.me/923116770059?text=Assalam-o-Alaikum,%20Mujhe%20Faizan%20Lace%20Store%20se%20Product%201%20Order%20Karni%20Hai" class="order-btn" target="_blank">WhatsApp Par Order Karein</a>
        </div>

        <!-- Product 2 -->
        <div class="product-card">
            <img src="https://via.placeholder.com/250" alt="Lace Product 2">
            <div class="product-title">Premium Lace Design 2</div>
            <div class="product-price">Rs. 800</div>
            <a href="https://wa.me/923001234567?text=Assalam-o-Alaikum,%20Mujhe%20Faizan%20Lace%20Store%20se%20Product%202%20Order%20Karni%20Hai" class="order-btn" target="_blank">WhatsApp Par Order Karein</a>
        </div>
    </div>

</body>
</html>
